<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Tiempo — Droguería Grassi</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d12; color: #e2e8f0; font-family: system-ui, sans-serif; }
    input, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d12; }
    ::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── Supabase ──────────────────────────────────────────────
    const { createClient } = supabase;
    const sb = createClient(
      "https://pxliptzozxawjpexlidz.supabase.co",
      "sb_publishable_1HO_esazx7YKdYK5JKb57g_8tELuOkA"
    );

    // ── Constantes ────────────────────────────────────────────
    const ADMIN_PASS   = "Bacha44";
    const EXEMPT_TYPES = ["vacation", "franco", "solicitud", "dia_especial"];

    const DEFAULT_EMPLOYEES = [
      { id:"AF001", name:"Agustín Faró",          schedule_wday:540, schedule_sat:0   },
      { id:"AM002", name:"Agustín Muschiato",     schedule_wday:480, schedule_sat:300 },
      { id:"AB003", name:"Agustina Billalva",     schedule_wday:480, schedule_sat:300 },
      { id:"AG004", name:"Ariel González",        schedule_wday:480, schedule_sat:300 },
      { id:"IR005", name:"Ignacio Risso",         schedule_wday:480, schedule_sat:300 },
      { id:"LL006", name:"Luciana López",         schedule_wday:540, schedule_sat:0   },
      { id:"MB007", name:"Mauricio Bustos",       schedule_wday:480, schedule_sat:300 },
      { id:"MA008", name:"Maximiliano Arias",     schedule_wday:480, schedule_sat:300 },
      { id:"NA009", name:"Nahuel Arias Escudero", schedule_wday:300, schedule_sat:300 },
      { id:"PG010", name:"Pablo Gianini",         schedule_wday:480, schedule_sat:300 },
      { id:"RM011", name:"Rodrigo Machó",         schedule_wday:240, schedule_sat:0   },
    ];

    const EVENT_COLOR = { vacation:"blue", franco:"green", tramite:"amber", dia_especial:"purple", solicitud:"red" };
    const EVENT_LABEL = { vacation:"Vacaciones", franco:"Franco", tramite:"Trámite", dia_especial:"Día Especial", solicitud:"Solicitud" };

    // ── Helpers ───────────────────────────────────────────────
    function diffMin(a, b) { return Math.round((new Date(b) - new Date(a)) / 60000); }
    function toHHMM(min) {
      const sign = min < 0 ? "-" : "+";
      const abs  = Math.abs(min);
      return `${sign}${String(Math.floor(abs/60)).padStart(2,"0")}:${String(abs%60).padStart(2,"0")}`;
    }
    function fmtTime(iso) {
      if (!iso) return "--:--";
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }
    function fmtDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
    }
    function isoDate(d = new Date()) { return d.toISOString().slice(0,10); }
    const PIN_DURATION = 30;
    function getPINSlot() { return Math.floor(Date.now() / (PIN_DURATION * 1000)); }
    function generatePIN(slot) {
      let h = slot * 2654435761;
      h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
      h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
      h = (h ^ (h >>> 16)) >>> 0;
      return String((h % 900000) + 100000);
    }
    function currentPIN() { return generatePIN(getPINSlot()); }
    function isValidPIN(input) {
      const s = getPINSlot();
      return input === generatePIN(s) || input === generatePIN(s - 1);
    }
    function secsLeft() { return PIN_DURATION - (Math.floor(Date.now() / 1000) % PIN_DURATION); }
    function exportCSV(rows, filename) {
      const BOM = "\uFEFF";
      const csv = rows.map(r => r.map(c => `"${String(c ?? "").replace(/"/g,'""')}"`).join(",")).join("\n");
      const blob = new Blob([BOM + csv], { type:"text/csv;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url; a.download = filename; a.click();
    }

    // ── Estilos ───────────────────────────────────────────────
    const S = {
      app:  { minHeight:"100vh", background:"#0d0d12", color:"#e2e8f0", fontFamily:"system-ui,sans-serif", padding:"16px" },
      card: { background:"#13131f", border:"1px solid #1e2d4a", borderRadius:"12px", padding:"20px", marginBottom:"16px" },
      inp:  { background:"#0d0d12", border:"1px solid #1e2d4a", borderRadius:"8px", padding:"10px 14px", color:"#e2e8f0", width:"100%", fontSize:"15px" },
      sel:  { background:"#0d0d12", border:"1px solid #1e2d4a", borderRadius:"8px", padding:"10px 14px", color:"#e2e8f0", width:"100%", fontSize:"15px" },
      lbl:  { fontSize:"11px", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:"#64748b", marginBottom:"4px", display:"block" },
      th:   { padding:"10px 14px", textAlign:"left", fontSize:"12px", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.06em", color:"#64748b", borderBottom:"1px solid #1e2d4a" },
      td:   { padding:"10px 14px", borderBottom:"1px solid #0d0d12", fontSize:"14px" },
      pos:  { color:"#4ade80" },
      neg:  { color:"#f87171" },
    };
    const btn = (c="blue") => {
      const map = { blue:"#3b82f6", green:"#22c55e", red:"#ef4444", gray:"#475569", amber:"#f59e0b" };
      return { background:map[c]||map.blue, color:"#fff", border:"none", borderRadius:"8px", padding:"10px 18px", cursor:"pointer", fontWeight:600, fontSize:"14px" };
    };
    const badge = (c="blue") => {
      const bg  = { blue:"#1e3a5f", green:"#14532d", red:"#450a0a", amber:"#451a03", purple:"#2e1065", gray:"#1e293b" };
      const txt = { blue:"#93c5fd", green:"#86efac", red:"#fca5a5", amber:"#fcd34d", purple:"#d8b4fe", gray:"#94a3b8" };
      return { background:bg[c]||bg.blue, color:txt[c]||txt.blue, borderRadius:"9999px", padding:"3px 10px", fontSize:"12px", fontWeight:600, whiteSpace:"nowrap" };
    };

    // ══════════════════════════════════════════════════════════
    // Hook useAttendance
    // ══════════════════════════════════════════════════════════
    function useAttendance() {
      const [employees, setEmployees] = useState([]);
      const [records,   setRecords]   = useState([]);
      const [events,    setEvents]    = useState([]);
      const [loading,   setLoading]   = useState(true);
      const [error,     setError]     = useState(null);

      const loadAll = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const [empRes, recRes, evtRes] = await Promise.all([
            sb.from("employees").select("*").order("name"),
            sb.from("records").select("*").order("check_in", { ascending:false }),
            sb.from("events").select("*").order("date", { ascending:false }),
          ]);
          if (empRes.error) throw empRes.error;
          if (recRes.error) throw recRes.error;
          if (evtRes.error) throw evtRes.error;

          let emps = empRes.data || [];
          if (emps.length === 0) {
            const { data: inserted, error: insErr } = await sb.from("employees").insert(DEFAULT_EMPLOYEES).select();
            if (insErr) throw insErr;
            emps = inserted || DEFAULT_EMPLOYEES;
          }
          setEmployees(emps);
          setRecords(recRes.data || []);
          setEvents(evtRes.data  || []);
        } catch(e) {
          setError(e.message || "Error conectando con la base de datos");
        }
        setLoading(false);
      }, []);

      useEffect(() => { loadAll(); }, [loadAll]);

      function getEmp(id) { return employees.find(e => e.id === id); }

      function getExpectedMin(emp, dateStr) {
        const d = new Date(dateStr + "T12:00:00");
        const dow = d.getDay();
        if (dow === 0) return 0;
        if (dow === 6) return emp.schedule_sat ?? 0;
        return emp.schedule_wday ?? 480;
      }

      function getStats(empId) {
        const empRecs = records.filter(r => r.emp_id===empId && r.check_out);
        const empEvts = events.filter(e => e.emp_id===empId);
        let worked = 0, expected = 0, days = 0;
        const daysWorked = [...new Set(empRecs.map(r => r.date))];
        daysWorked.forEach(dateStr => {
          const emp = getEmp(empId);
          if (!emp) return;
          const dayMin = empRecs.filter(r => r.date===dateStr).reduce((s,r) => s+diffMin(r.check_in,r.check_out), 0);
          worked += dayMin;
          days++;
          const exempt = empEvts.some(e => EXEMPT_TYPES.includes(e.type) && e.date<=dateStr && (e.date_to||e.date)>=dateStr);
          if (!exempt) expected += getExpectedMin(emp, dateStr);
        });
        empEvts.filter(e => EXEMPT_TYPES.includes(e.type)).forEach(evt => {
          const start = new Date(evt.date+"T12:00:00");
          const end   = new Date((evt.date_to||evt.date)+"T12:00:00");
          for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
            const ds = isoDate(d);
            if (d.getDay()===0) continue;
            if (!daysWorked.includes(ds)) days++;
          }
        });
        return { worked, expected, balance:worked-expected, days };
      }

      function getTodayRecord(empId) {
        const today = isoDate();
        return records.find(r => r.emp_id===empId && r.date===today);
      }

      async function checkIn(empId) {
        const today = isoDate();
        const now   = new Date().toISOString();
        const rec   = getTodayRecord(empId);
        if (rec && !rec.check_out) return { ok:false, msg:"Ya tiene entrada registrada sin salida." };
        if (rec &&  rec.check_out) return { ok:false, msg:"Ya completó su jornada hoy." };
        const { data, error } = await sb.from("records").insert({ emp_id:empId, date:today, check_in:now }).select().single();
        if (error) return { ok:false, msg:"Error al registrar entrada: "+error.message };
        setRecords(prev => [data, ...prev]);
        return { ok:true, msg:`Entrada registrada: ${fmtTime(now)}` };
      }

      async function checkOut(empId) {
        const rec = getTodayRecord(empId);
        if (!rec)          return { ok:false, msg:"No hay entrada registrada hoy." };
        if (rec.check_out) return { ok:false, msg:"La salida ya fue registrada." };
        const now     = new Date().toISOString();
        const minutes = diffMin(rec.check_in, now);
        const { data, error } = await sb.from("records").update({ check_out:now }).eq("id",rec.id).select().single();
        if (error) return { ok:false, msg:"Error al registrar salida: "+error.message };
        setRecords(prev => prev.map(r => r.id===rec.id ? data : r));
        return { ok:true, msg:`Salida: ${fmtTime(now)} | ${toHHMM(minutes)} trabajados` };
      }

      async function addEvent(evt) {
        const { data, error } = await sb.from("events").insert(evt).select().single();
        if (error) { console.error(error); return false; }
        setEvents(prev => [data, ...prev]);
        return true;
      }

      async function deleteEvent(id) {
        const { error } = await sb.from("events").delete().eq("id",id);
        if (error) { console.error(error); return false; }
        setEvents(prev => prev.filter(e => e.id!==id));
        return true;
      }

      async function updateEmployee(id, changes) {
        const { data, error } = await sb.from("employees").update(changes).eq("id",id).select().single();
        if (error) { console.error(error); return false; }
        setEmployees(prev => prev.map(e => e.id===id ? data : e));
        return true;
      }

      async function deleteRecord(id) {
        const { error } = await sb.from("records").delete().eq("id",id);
        if (error) { console.error(error); return false; }
        setRecords(prev => prev.filter(r => r.id!==id));
        return true;
      }

      return {
        employees, records, events, loading, error,
        getEmp, getStats, getTodayRecord, getExpectedMin,
        checkIn, checkOut, addEvent, deleteEvent, updateEmployee, deleteRecord,
        reload: loadAll,
      };
    }


    // ══════════════════════════════════════════════════════════
    // ROUTER — decide pantalla por ?mode= en la URL
    // ══════════════════════════════════════════════════════════
    function App() {
      const params = new URLSearchParams(window.location.search);
      const mode   = params.get("mode");
      if (mode === "pin")   return <PINDisplay />;
      if (mode === "kiosk") return <KioskScreen />;
      return <HomeScreen />;
    }

    // ══════════════════════════════════════════════════════════
    // PIN DISPLAY — celular del empleado al escanear el QR
    // ══════════════════════════════════════════════════════════
    function PINDisplay() {
      const [pin,  setPin]  = useState(currentPIN());
      const [secs, setSecs] = useState(secsLeft());
      useEffect(() => {
        const t = setInterval(() => { setPin(currentPIN()); setSecs(secsLeft()); }, 500);
        return () => clearInterval(t);
      }, []);
      const progress = (secs / PIN_DURATION) * 100;
      const urgent   = secs <= 5;
      return (
        <div style={{ minHeight:"100vh", background:"#080810", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px", textAlign:"center" }}>
          <div style={{ fontSize:"11px", letterSpacing:"0.25em", color:"#3d5a80", textTransform:"uppercase", marginBottom:"36px" }}>Droguería Grassi</div>
          <div style={{ background:"#0f0f1a", border:"1px solid #1a2744", borderRadius:"20px", padding:"40px 56px", marginBottom:"28px" }}>
            <div style={{ fontSize:"11px", letterSpacing:"0.2em", color:"#64748b", textTransform:"uppercase", marginBottom:"14px" }}>PIN de acceso</div>
            <div style={{ fontSize:"68px", fontFamily:"monospace", fontWeight:900, letterSpacing:"12px", color: urgent ? "#f87171" : "#60a5fa", textShadow: urgent ? "0 0 30px rgba(248,113,113,0.5)" : "0 0 30px rgba(96,165,250,0.5)" }}>
              {pin}
            </div>
          </div>
          <div style={{ width:"240px", marginBottom:"12px" }}>
            <div style={{ background:"#1a2744", borderRadius:"9999px", height:"6px", overflow:"hidden" }}>
              <div style={{ background: urgent ? "#ef4444" : "#60a5fa", height:"100%", width:progress+"%", transition:"width 0.5s linear", borderRadius:"9999px" }} />
            </div>
          </div>
          <div style={{ fontSize:"13px", color: urgent ? "#f87171" : "#64748b", marginBottom:"48px" }}>
            {urgent ? "¡Caduca pronto!" : `Caduca en ${secs}s`}
          </div>
          <div style={{ fontSize:"12px", color:"#1e2d4a", maxWidth:"260px", lineHeight:"1.8" }}>
            Mostrá este PIN en la computadora de recepción para registrar tu ingreso o egreso.
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // KIOSK — PC de recepción, registra entrada/salida
    // ══════════════════════════════════════════════════════════
    function KioskScreen() {
      const att = useAttendance();
      const [empCode,  setEmpCode]  = useState("");
      const [pinInput, setPinInput] = useState("");
      const [msg,      setMsg]      = useState(null);
      const [busy,     setBusy]     = useState(false);
      const [clock,    setClock]    = useState(new Date());
      useEffect(() => {
        const t = setInterval(() => setClock(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      async function handle(type) {
        setMsg(null);
        if (!empCode.trim()) return setMsg({ ok:false, text:"Ingresá tu código de empleado." });
        if (!isValidPIN(pinInput.trim())) return setMsg({ ok:false, text:"PIN inválido o expirado. Escaneá el QR de nuevo." });
        const emp = att.getEmp(empCode.trim().toUpperCase());
        if (!emp) return setMsg({ ok:false, text:"Código de empleado no encontrado." });
        setBusy(true);
        const res = type === "in" ? await att.checkIn(emp.id) : await att.checkOut(emp.id);
        setMsg({ ok:res.ok, text: res.ok ? emp.name + " — " + res.msg : res.msg });
        setBusy(false);
        if (res.ok) { setEmpCode(""); setPinInput(""); }
      }
      const hh = String(clock.getHours()).padStart(2,"0");
      const mm = String(clock.getMinutes()).padStart(2,"0");
      const ss = String(clock.getSeconds()).padStart(2,"0");
      return (
        <div style={{ ...S.app, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:"24px", backgroundImage:"radial-gradient(ellipse at center,#0d1a3a 0%,#080810 70%)" }}>
          <div style={{ textAlign:"center", marginBottom:"32px" }}>
            <div style={{ fontSize:"11px", letterSpacing:"0.25em", color:"#3d5a80", textTransform:"uppercase", marginBottom:"8px" }}>Droguería Grassi</div>
            <div style={{ fontSize:"52px", fontFamily:"monospace", fontWeight:900, letterSpacing:"6px", textShadow:"0 0 30px rgba(96,165,250,0.15)" }}>{hh}:{mm}:{ss}</div>
            <div style={{ fontSize:"13px", color:"#475569", marginTop:"6px", textTransform:"capitalize" }}>
              {clock.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}
            </div>
          </div>
          {att.loading && <p style={{ color:"#64748b" }}>Conectando...</p>}
          {att.error   && <p style={{ color:"#f87171" }}>Error: {att.error}</p>}
          {!att.loading && !att.error && (
            <div style={{ ...S.card, width:"100%", maxWidth:"420px" }}>
              <p style={{ color:"#64748b", fontSize:"13px", marginBottom:"20px", textAlign:"center" }}>
                Ingresá tu código y el PIN del cartel
              </p>
              <label style={S.lbl}>Código de empleado</label>
              <input
                style={{ ...S.inp, marginBottom:"16px", textTransform:"uppercase", letterSpacing:"3px", fontSize:"18px" }}
                value={empCode} onChange={e => setEmpCode(e.target.value.toUpperCase())}
                placeholder="AF001" autoFocus
              />
              <label style={S.lbl}>PIN del cartel</label>
              <input
                style={{ ...S.inp, marginBottom:"24px", fontFamily:"monospace", letterSpacing:"10px", fontSize:"30px", textAlign:"center" }}
                type="text" inputMode="numeric" maxLength={6}
                value={pinInput} onChange={e => setPinInput(e.target.value)}
                placeholder="000000"
              />
              {msg && (
                <div style={{ padding:"12px 16px", borderRadius:"8px", marginBottom:"20px", background:msg.ok?"#14532d":"#450a0a", color:msg.ok?"#86efac":"#fca5a5", fontSize:"14px", textAlign:"center", fontWeight:600 }}>
                  {msg.text}
                </div>
              )}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px" }}>
                <button style={{ ...btn("green"), padding:"16px", fontSize:"16px" }} onClick={() => handle("in")}  disabled={busy}>✅ Entrada</button>
                <button style={{ ...btn("red"),   padding:"16px", fontSize:"16px" }} onClick={() => handle("out")} disabled={busy}>🔴 Salida</button>
              </div>
            </div>
          )}
          <div style={{ marginTop:"16px" }}>
            <a href={window.location.pathname} style={{ color:"#1e2d4a", fontSize:"11px", textDecoration:"none" }}>admin</a>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // HOME — entrada al panel admin + imprimir QR
    // ══════════════════════════════════════════════════════════
    function HomeScreen() {
      const [screen,    setScreen]    = useState("home");
      const [adminAuth, setAdminAuth] = useState(false);
      const [adminPass, setAdminPass] = useState("");
      const att = useAttendance();
      if (screen === "admin") {
        if (!adminAuth) return (
          <div style={{ ...S.app, display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh" }}>
            <div style={{ ...S.card, width:"320px" }}>
              <h2 style={{ margin:"0 0 20px", fontSize:"20px" }}>🔐 Administración</h2>
              <label style={S.lbl}>Contraseña</label>
              <input type="password" style={{ ...S.inp, marginBottom:"16px", letterSpacing:"4px" }}
                value={adminPass} onChange={e => setAdminPass(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter"){ if(adminPass===ADMIN_PASS) setAdminAuth(true); else alert("Contraseña incorrecta"); }}}
                placeholder="••••••" autoFocus />
              <div style={{ display:"flex", gap:"8px", marginTop:"4px" }}>
                <button style={btn("gray")} onClick={() => setScreen("home")}>Volver</button>
                <button style={btn("blue")} onClick={() => { if(adminPass===ADMIN_PASS) setAdminAuth(true); else alert("Contraseña incorrecta"); }}>Ingresar</button>
              </div>
            </div>
          </div>
        );
        return <AdminPanel att={att} onBack={() => { setAdminAuth(false); setAdminPass(""); setScreen("home"); }} />;
      }
      return (
        <div style={{ ...S.app, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", gap:"28px", padding:"20px", backgroundImage:"radial-gradient(ellipse at 20% 50%,#0d1a3a 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#1a0d3a 0%,transparent 50%)" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:"12px", letterSpacing:"0.2em", color:"#60a5fa", marginBottom:"8px", textTransform:"uppercase" }}>Droguería Grassi · Ganímedes Lab</div>
            <h1 style={{ fontSize:"48px", fontWeight:900, background:"linear-gradient(135deg,#60a5fa,#818cf8,#a78bfa)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", margin:0, lineHeight:1 }}>A Tiempo</h1>
            <p style={{ color:"#475569", fontSize:"13px", marginTop:"10px" }}>Sistema de Control de Asistencia</p>
          </div>
          {att.loading && <p style={{ color:"#64748b", fontSize:"14px" }}>⏳ Conectando...</p>}
          {att.error && <div style={{ background:"#450a0a", color:"#fca5a5", padding:"12px 20px", borderRadius:"8px", fontSize:"14px", maxWidth:"340px", textAlign:"center" }}>⚠️ {att.error}</div>}
          <div style={{ display:"flex", flexDirection:"column", gap:"10px", width:"100%", maxWidth:"280px" }}>
            <button style={{ ...btn("blue"),  padding:"15px", fontSize:"15px" }} onClick={() => setScreen("admin")}>🔐 Administración</button>

    // ══════════════════════════════════════════════════════════
    // QR PRINT — genera el cartel para imprimir
    // ══════════════════════════════════════════════════════════
    function QRPrintPage({ onBack }) {
      const qrRef  = useRef(null);
      const pinURL = window.location.origin + window.location.pathname + "?mode=pin";
      useEffect(() => {
        if (qrRef.current && window.QRCode) {
          qrRef.current.innerHTML = "";
          new window.QRCode(qrRef.current, { text:pinURL, width:260, height:260, colorDark:"#000000", colorLight:"#ffffff", correctLevel:window.QRCode.CorrectLevel.H });
        }
      }, []);
      return (
        <div style={{ minHeight:"100vh", background:"#080810", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"32px", gap:"20px" }}>
          <div style={{ background:"#fff", borderRadius:"16px", padding:"36px", textAlign:"center", maxWidth:"340px", width:"100%" }}>
            <div style={{ fontSize:"13px", fontWeight:700, color:"#000", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:"4px" }}>Droguería Grassi</div>
            <div style={{ fontSize:"22px", fontWeight:900, color:"#000", marginBottom:"4px" }}>Registro de Asistencia</div>
            <div style={{ fontSize:"13px", color:"#666", marginBottom:"24px" }}>Escaneá para obtener tu PIN</div>
            <div ref={qrRef} style={{ display:"inline-block", marginBottom:"24px" }} />
            <div style={{ background:"#f5f5f5", borderRadius:"8px", padding:"14px", fontSize:"13px", color:"#333", lineHeight:"1.8", textAlign:"left" }}>
              <div style={{ fontWeight:700, marginBottom:"4px" }}>Cómo registrarte:</div>
              <div>1. Escaneá el QR con tu celular</div>
              <div>2. Anotá el PIN de 6 dígitos</div>
              <div>3. Ingresalo en la PC de recepción</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:"12px" }}>
            <button style={btn("gray")} onClick={onBack}>← Volver</button>
            <button style={btn("blue")} onClick={() => window.print()}>🖨️ Imprimir</button>
          </div>
        </div>
      );
    }

    // Admin Panel
    // ══════════════════════════════════════════════════════════
    function AdminPanel({ att, onBack }) {
      const [view,   setView]   = useState("dashboard");
      const [selEmp, setSelEmp] = useState(null);

      const navItems = [
        { id:"dashboard", label:"📊 Dashboard"   },
        { id:"calendar",  label:"📅 Calendario"  },
        { id:"reports",   label:"📈 Reportes"    },
        { id:"history",   label:"🗂️ Historial"  },
        { id:"qr",        label:"🖨️ Cartel QR"  },
      ];

      return (
        <div style={{ background:"#0d0d12", minHeight:"100vh", color:"#e2e8f0" }}>
          <div style={{ background:"#0d0d12", borderBottom:"1px solid #1e2d4a", padding:"12px 20px", display:"flex", alignItems:"center", gap:"12px", flexWrap:"wrap", position:"sticky", top:0, zIndex:10 }}>
            <span style={{ fontWeight:800, fontSize:"18px", background:"linear-gradient(135deg,#60a5fa,#a78bfa)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>A Tiempo</span>
            <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
              {navItems.map(n => (
                <button key={n.id}
                  style={{ ...btn(view===n.id?"blue":"gray"), padding:"6px 14px", fontSize:"13px" }}
                  onClick={()=>{ setView(n.id); setSelEmp(null); }}>
                  {n.label}
                </button>
              ))}
            </div>
            <button style={{ ...btn("red"), padding:"6px 14px", fontSize:"13px", marginLeft:"auto" }} onClick={onBack}>Salir</button>
          </div>
          <div style={{ padding:"20px" }}>
            {att.loading && <p style={{ color:"#64748b", textAlign:"center", padding:"40px" }}>⏳ Cargando datos...</p>}
            {att.error   && <p style={{ color:"#f87171", textAlign:"center", padding:"40px" }}>⚠️ {att.error}</p>}
            {!att.loading && !att.error && view==="dashboard" && !selEmp && (
              <DashboardView att={att} onSelectEmp={e=>{ setSelEmp(e); setView("employee"); }} />
            )}
            {!att.loading && !att.error && view==="employee" && selEmp && (
              <EmployeeDetail att={att} emp={selEmp} onBack={()=>{ setSelEmp(null); setView("dashboard"); }} />
            )}
            {!att.loading && !att.error && view==="calendar"  && <CalendarView  att={att} />}
            {!att.loading && !att.error && view==="reports"   && <ReportsView   att={att} />}
            {!att.loading && !att.error && view==="history"   && <HistoryView   att={att} />}
            {view==="qr" && <QRPrintPage onBack={() => setView("dashboard")} />}
          </div>
        </div>
      );
    }

    // ── Dashboard ─────────────────────────────────────────────
    function DashboardView({ att, onSelectEmp }) {
      return (
        <div>
          <h2 style={{ margin:"0 0 20px", fontSize:"20px" }}>
            Dashboard — {new Date().toLocaleDateString("es-AR", { weekday:"long", day:"numeric", month:"long" })}
          </h2>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:"16px" }}>
            {att.employees.map(emp => {
              const rec    = att.getTodayRecord(emp.id);
              const stats  = att.getStats(emp.id);
              const status = !rec ? "ausente" : !rec.check_out ? "en_turno" : "completo";
              const statusColor = { ausente:"gray", en_turno:"green", completo:"blue" };
              const statusLabel = { ausente:"AUSENTE", en_turno:"EN TURNO", completo:"COMPLETO" };
              return (
                <div key={emp.id} style={{ ...S.card, cursor:"pointer", transition:"border-color 0.2s" }}
                  onClick={()=>onSelectEmp(emp)}
                  onMouseEnter={e=>e.currentTarget.style.borderColor="#3b82f6"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="#1e2d4a"}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"12px" }}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:"15px" }}>{emp.name}</div>
                      <div style={{ color:"#64748b", fontSize:"12px", fontFamily:"monospace" }}>{emp.id}</div>
                    </div>
                    <span style={badge(statusColor[status])}>{statusLabel[status]}</span>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", fontSize:"13px" }}>
                    <div><div style={S.lbl}>Entrada</div><div style={{ fontFamily:"monospace" }}>{rec ? fmtTime(rec.check_in) : "--:--"}</div></div>
                    <div><div style={S.lbl}>Salida</div><div style={{ fontFamily:"monospace" }}>{rec?.check_out ? fmtTime(rec.check_out) : "--:--"}</div></div>
                    <div><div style={S.lbl}>Días trabajados</div><div>{stats.days}</div></div>
                    <div><div style={S.lbl}>Balance total</div><div style={stats.balance>=0?S.pos:S.neg}>{toHHMM(stats.balance)}</div></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Employee Detail ───────────────────────────────────────
    function EmployeeDetail({ att, emp, onBack }) {
      const [showEventForm, setShowEventForm] = useState(false);
      const stats   = att.getStats(emp.id);
      const empRecs = att.records.filter(r => r.emp_id===emp.id && r.check_out).sort((a,b)=>b.date.localeCompare(a.date));
      const empEvts = att.events.filter(e => e.emp_id===emp.id);

      function exportEmp() {
        const rows = [
          ["Fecha","Entrada","Salida","Trabajado","Esperado","Balance"],
          ...empRecs.map(r => {
            const worked   = diffMin(r.check_in, r.check_out);
            const expected = att.getExpectedMin(emp, r.date);
            const exempt   = empEvts.some(e => EXEMPT_TYPES.includes(e.type) && e.date<=r.date && (e.date_to||e.date)>=r.date);
            return [fmtDate(r.date+"T12:00:00"), fmtTime(r.check_in), fmtTime(r.check_out), toHHMM(worked), exempt?"EXENTO":toHHMM(expected), exempt?"--":toHHMM(worked-expected)];
          }),
          [],
          ["TOTAL","","",toHHMM(stats.worked),toHHMM(stats.expected),toHHMM(stats.balance)],
        ];
        exportCSV(rows, `asistencia_${emp.id}.csv`);
      }

      return (
        <div>
          <div style={{ display:"flex", gap:"12px", alignItems:"center", marginBottom:"20px", flexWrap:"wrap" }}>
            <button style={btn("gray")} onClick={onBack}>← Volver</button>
            <div>
              <h2 style={{ margin:0, fontSize:"20px" }}>{emp.name}</h2>
              <span style={{ color:"#64748b", fontFamily:"monospace", fontSize:"13px" }}>{emp.id}</span>
            </div>
            <button style={{ ...btn("green"), marginLeft:"auto" }} onClick={()=>setShowEventForm(true)}>+ Evento</button>
            <button style={btn("blue")} onClick={exportEmp}>↓ CSV</button>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))", gap:"12px", marginBottom:"20px" }}>
            {[
              { label:"Días trabajados",  value:stats.days,              color:"#e2e8f0" },
              { label:"Horas trabajadas", value:toHHMM(stats.worked),    color:"#e2e8f0" },
              { label:"Horas esperadas",  value:toHHMM(stats.expected),  color:"#e2e8f0" },
              { label:"Balance",          value:toHHMM(stats.balance),   color:stats.balance>=0?"#4ade80":"#f87171" },
            ].map(s => (
              <div key={s.label} style={S.card}>
                <div style={S.lbl}>{s.label}</div>
                <div style={{ fontSize:"22px", fontWeight:700, color:s.color }}>{s.value}</div>
              </div>
            ))}
          </div>

          <div style={{ ...S.card, overflowX:"auto" }}>
            <h3 style={{ margin:"0 0 12px", fontSize:"16px" }}>Historial de Asistencia</h3>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:"500px" }}>
              <thead><tr>{["Fecha","Entrada","Salida","Trabajado","Esperado","Balance"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {empRecs.length===0 && <tr><td colSpan={6} style={{ ...S.td, textAlign:"center", color:"#475569", padding:"24px" }}>Sin registros</td></tr>}
                {empRecs.map(r => {
                  const worked   = diffMin(r.check_in, r.check_out);
                  const expected = att.getExpectedMin(emp, r.date);
                  const exempt   = empEvts.some(e => EXEMPT_TYPES.includes(e.type) && e.date<=r.date && (e.date_to||e.date)>=r.date);
                  const bal      = worked - expected;
                  return (
                    <tr key={r.id}>
                      <td style={S.td}>{fmtDate(r.date+"T12:00:00")}</td>
                      <td style={{ ...S.td, fontFamily:"monospace" }}>{fmtTime(r.check_in)}</td>
                      <td style={{ ...S.td, fontFamily:"monospace" }}>{fmtTime(r.check_out)}</td>
                      <td style={{ ...S.td, fontFamily:"monospace" }}>{toHHMM(worked)}</td>
                      <td style={{ ...S.td, fontFamily:"monospace", color:"#64748b" }}>{exempt?"EXENTO":toHHMM(expected)}</td>
                      <td style={{ ...S.td, fontFamily:"monospace", ...(exempt?{}:bal>=0?S.pos:S.neg) }}>{exempt?"--":toHHMM(bal)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{ ...S.card, marginTop:"16px" }}>
            <h3 style={{ margin:"0 0 12px", fontSize:"16px" }}>Eventos</h3>
            {empEvts.length===0 && <p style={{ color:"#475569", fontSize:"14px" }}>Sin eventos registrados.</p>}
            <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
              {empEvts.map(e => (
                <div key={e.id} style={{ display:"flex", alignItems:"center", gap:"10px", padding:"10px 14px", background:"#0d0d12", borderRadius:"8px", flexWrap:"wrap" }}>
                  <span style={badge(EVENT_COLOR[e.type]||"blue")}>{EVENT_LABEL[e.type]||e.type}</span>
                  <span style={{ fontSize:"13px", color:"#94a3b8" }}>
                    {fmtDate(e.date+"T12:00:00")}{e.date_to&&e.date_to!==e.date?` → ${fmtDate(e.date_to+"T12:00:00")}`:""}
                    {e.hours?` · ${e.hours}`:""}
                    {e.note ?` · ${e.note}` :""}
                  </span>
                  <button style={{ ...btn("red"), padding:"3px 10px", fontSize:"12px", marginLeft:"auto" }} onClick={()=>att.deleteEvent(e.id)}>✕</button>
                </div>
              ))}
            </div>
          </div>

          {showEventForm && (
            <EventForm employees={att.employees} defaultEmpId={emp.id}
              onSave={async evt=>{ await att.addEvent(evt); setShowEventForm(false); }}
              onClose={()=>setShowEventForm(false)} />
          )}
        </div>
      );
    }

    // ── Event Form ────────────────────────────────────────────
    function EventForm({ employees, defaultEmpId, onSave, onClose }) {
      const [empId,    setEmpId]  = useState(defaultEmpId || "");
      const [type,     setType]   = useState("vacation");
      const [date,     setDate]   = useState(isoDate());
      const [dateTo,   setDateTo] = useState(isoDate());
      const [timeFrom, setTF]     = useState("");
      const [timeTo,   setTT]     = useState("");
      const [note,     setNote]   = useState("");
      const [busy,     setBusy]   = useState(false);

      async function save() {
        if (!empId) return;
        setBusy(true);
        let hours = "";
        if (type==="tramite" && timeFrom && timeTo) {
          const [h1,m1] = timeFrom.split(":").map(Number);
          const [h2,m2] = timeTo.split(":").map(Number);
          const mins    = (h2*60+m2)-(h1*60+m1);
          if (mins>0) hours = `${Math.floor(mins/60)}h ${mins%60}m`;
        }
        await onSave({ emp_id:empId, type, date, date_to:dateTo||date, time_from:timeFrom||null, time_to:timeTo||null, hours:hours||null, note:note||null });
        setBusy(false);
      }

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:"16px" }}>
          <div style={{ ...S.card, width:"100%", maxWidth:"420px", maxHeight:"90vh", overflowY:"auto", margin:0 }}>
            <h3 style={{ margin:"0 0 16px" }}>Agregar Evento</h3>
            <label style={S.lbl}>Empleado</label>
            <select style={{ ...S.sel, marginBottom:"12px" }} value={empId} onChange={e=>setEmpId(e.target.value)}>
              <option value="">-- Seleccionar --</option>
              {employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
            <label style={S.lbl}>Tipo</label>
            <select style={{ ...S.sel, marginBottom:"12px" }} value={type} onChange={e=>setType(e.target.value)}>
              {Object.entries(EVENT_LABEL).map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px", marginBottom:"12px" }}>
              <div><label style={S.lbl}>Desde</label><input type="date" style={S.inp} value={date}   onChange={e=>setDate(e.target.value)} /></div>
              <div><label style={S.lbl}>Hasta</label><input type="date" style={S.inp} value={dateTo} onChange={e=>setDateTo(e.target.value)} /></div>
            </div>
            {type==="tramite" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px", marginBottom:"12px" }}>
                <div><label style={S.lbl}>Hora desde</label><input type="time" style={S.inp} value={timeFrom} onChange={e=>setTF(e.target.value)} /></div>
                <div><label style={S.lbl}>Hora hasta</label><input type="time" style={S.inp} value={timeTo}   onChange={e=>setTT(e.target.value)} /></div>
              </div>
            )}
            <label style={S.lbl}>Nota (opcional)</label>
            <input style={{ ...S.inp, marginBottom:"20px" }} value={note} onChange={e=>setNote(e.target.value)} placeholder="..." />
            <div style={{ display:"flex", gap:"8px" }}>
              <button style={btn("gray")} onClick={onClose}>Cancelar</button>
              <button style={btn("green")} onClick={save} disabled={busy||!empId}>{busy?"Guardando...":"Guardar"}</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Calendar View ─────────────────────────────────────────
    function CalendarView({ att }) {
      const [showForm, setShowForm] = useState(false);
      const eventsByEmp = att.employees
        .map(emp => ({ emp, events:att.events.filter(e=>e.emp_id===emp.id).sort((a,b)=>b.date.localeCompare(a.date)) }))
        .filter(x => x.events.length > 0);

      return (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px" }}>
            <h2 style={{ margin:0, fontSize:"20px" }}>Calendario de Eventos</h2>
            <button style={btn("green")} onClick={()=>setShowForm(true)}>+ Agregar Evento</button>
          </div>
          {eventsByEmp.length===0 && <p style={{ color:"#475569", padding:"20px 0" }}>No hay eventos registrados.</p>}
          {eventsByEmp.map(({ emp, events }) => (
            <div key={emp.id} style={S.card}>
              <h3 style={{ margin:"0 0 12px", fontSize:"15px" }}>{emp.name} <span style={{ color:"#64748b", fontFamily:"monospace", fontSize:"12px" }}>{emp.id}</span></h3>
              <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                {events.map(e => (
                  <div key={e.id} style={{ display:"flex", alignItems:"center", gap:"10px", padding:"10px 14px", background:"#0d0d12", borderRadius:"8px", flexWrap:"wrap" }}>
                    <span style={badge(EVENT_COLOR[e.type]||"blue")}>{EVENT_LABEL[e.type]||e.type}</span>
                    <span style={{ fontSize:"13px", color:"#94a3b8" }}>
                      {fmtDate(e.date+"T12:00:00")}{e.date_to&&e.date_to!==e.date?` → ${fmtDate(e.date_to+"T12:00:00")}`:""}
                      {e.hours?` · ${e.hours}`:""}
                      {e.note ?` · ${e.note}` :""}
                    </span>
                    <button style={{ ...btn("red"), padding:"3px 10px", fontSize:"12px", marginLeft:"auto" }} onClick={()=>att.deleteEvent(e.id)}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {showForm && (
            <EventForm employees={att.employees}
              onSave={async evt=>{ await att.addEvent(evt); setShowForm(false); }}
              onClose={()=>setShowForm(false)} />
          )}
        </div>
      );
    }

    // ── Reports View ──────────────────────────────────────────
    function ReportsView({ att }) {
      const now = new Date();
      const [month, setMonth] = useState(now.getMonth()+1);
      const [year,  setYear]  = useState(now.getFullYear());

      const rows = att.employees.map(emp => {
        const empRecs = att.records.filter(r => {
          if (!r.check_out) return false;
          const d = new Date(r.date+"T12:00:00");
          return r.emp_id===emp.id && d.getMonth()+1===month && d.getFullYear()===year;
        });
        const empEvts = att.events.filter(e => {
          const d = new Date(e.date+"T12:00:00");
          return e.emp_id===emp.id && d.getMonth()+1===month && d.getFullYear()===year;
        });
        const worked   = empRecs.reduce((s,r)=>s+diffMin(r.check_in,r.check_out), 0);
        const days     = new Set(empRecs.map(r=>r.date)).size;
        const expected = [...new Set(empRecs.map(r=>r.date))].reduce((s,ds) => {
          const exempt = empEvts.some(e=>EXEMPT_TYPES.includes(e.type)&&e.date<=ds&&(e.date_to||e.date)>=ds);
          return s + (exempt ? 0 : att.getExpectedMin(emp,ds));
        }, 0);
        const francos   = empEvts.filter(e=>e.type==="franco").length;
        const vacations = empEvts.filter(e=>e.type==="vacation").reduce((s,e)=>{
          const d1=new Date(e.date+"T12:00:00"), d2=new Date((e.date_to||e.date)+"T12:00:00");
          return s+Math.round((d2-d1)/86400000)+1;
        }, 0);
        const permits = empEvts.filter(e=>e.type==="tramite").reduce((s,e)=>s+(e.hours?parseFloat(e.hours):0), 0);
        return { emp, days, worked, expected, balance:worked-expected, francos, vacations, permits };
      });

      function exportMonth() {
        exportCSV(
          [["Empleado","ID","Días","Trabajado","Esperado","Balance","Francos","Vacaciones","Permisos (h)"],
           ...rows.map(r=>[r.emp.name,r.emp.id,r.days,toHHMM(r.worked),toHHMM(r.expected),toHHMM(r.balance),r.francos,r.vacations,r.permits.toFixed(1)])],
          `reporte_${year}_${String(month).padStart(2,"0")}.csv`
        );
      }

      const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

      return (
        <div>
          <div style={{ display:"flex", gap:"12px", alignItems:"center", marginBottom:"20px", flexWrap:"wrap" }}>
            <h2 style={{ margin:0, fontSize:"20px" }}>Reportes</h2>
            <select style={{ ...S.sel, width:"auto" }} value={month} onChange={e=>setMonth(Number(e.target.value))}>
              {meses.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
            </select>
            <select style={{ ...S.sel, width:"auto" }} value={year} onChange={e=>setYear(Number(e.target.value))}>
              {[2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <button style={btn("blue")} onClick={exportMonth}>↓ Exportar CSV</button>
          </div>
          <div style={{ ...S.card, overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:"600px" }}>
              <thead><tr>{["Empleado","Días","Trabajado","Esperado","Balance","Francos","Vacac.","Permisos"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {rows.map(r => (
                  <tr key={r.emp.id}>
                    <td style={S.td}><div style={{ fontWeight:600 }}>{r.emp.name}</div><div style={{ color:"#64748b", fontSize:"11px", fontFamily:"monospace" }}>{r.emp.id}</div></td>
                    <td style={S.td}>{r.days}</td>
                    <td style={{ ...S.td, fontFamily:"monospace" }}>{toHHMM(r.worked)}</td>
                    <td style={{ ...S.td, fontFamily:"monospace", color:"#64748b" }}>{toHHMM(r.expected)}</td>
                    <td style={{ ...S.td, fontFamily:"monospace", ...(r.balance>=0?S.pos:S.neg) }}>{toHHMM(r.balance)}</td>
                    <td style={S.td}>{r.francos||"-"}</td>
                    <td style={S.td}>{r.vacations||"-"}</td>
                    <td style={S.td}>{r.permits>0?`${r.permits.toFixed(1)}h`:"-"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── History View ──────────────────────────────────────────
    function HistoryView({ att }) {
      const allRecs = [...att.records]
        .filter(r=>r.check_out)
        .sort((a,b)=>new Date(b.check_in)-new Date(a.check_in));

      return (
        <div>
          <h2 style={{ margin:"0 0 20px", fontSize:"20px" }}>Historial Completo</h2>
          <div style={{ ...S.card, overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:"580px" }}>
              <thead><tr>{["Fecha","Empleado","ID","Entrada","Salida","Trabajado","Balance"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {allRecs.length===0 && <tr><td colSpan={7} style={{ ...S.td, textAlign:"center", color:"#475569", padding:"24px" }}>Sin registros</td></tr>}
                {allRecs.map(r => {
                  const emp     = att.getEmp(r.emp_id);
                  const worked  = diffMin(r.check_in, r.check_out);
                  const expected= emp ? att.getExpectedMin(emp, r.date) : 480;
                  const empEvts = att.events.filter(e=>e.emp_id===r.emp_id);
                  const exempt  = empEvts.some(e=>EXEMPT_TYPES.includes(e.type)&&e.date<=r.date&&(e.date_to||e.date)>=r.date);
                  const bal     = worked - expected;
                  return (
                    <tr key={r.id}>
                      <td style={S.td}>{fmtDate(r.date+"T12:00:00")}</td>
                      <td style={{ ...S.td, fontWeight:600 }}>{emp?.name||r.emp_id}</td>
                      <td style={{ ...S.td, fontFamily:"monospace", color:"#64748b", fontSize:"12px" }}>{r.emp_id}</td>
                      <td style={{ ...S.td, fontFamily:"monospace" }}>{fmtTime(r.check_in)}</td>
                      <td style={{ ...S.td, fontFamily:"monospace" }}>{fmtTime(r.check_out)}</td>
                      <td style={{ ...S.td, fontFamily:"monospace" }}>{toHHMM(worked)}</td>
                      <td style={{ ...S.td, fontFamily:"monospace", ...(exempt?{}:bal>=0?S.pos:S.neg) }}>{exempt?"EXENTO":toHHMM(bal)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── Render ────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
